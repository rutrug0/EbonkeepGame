    "weapon:melee:sword": "One melee sword only. Close crop detail composition. Guard and grip are the primary focus. Pommel must be clearly visible. Grip length and thickness must look realistically proportioned for a usable one-handed or hand-and-a-half sword, never toy-like or oversized. Show only a small beginning section of blade emerging from the guard, never a long blade segment and never full weapon length. Sword orientation is locked with hilt in lower-left and blade tip direction in upper-right. Keep a consistent diagonal from lower-left to upper-right with a shallow 10-15 degree rise toward top-right, never mirrored or reversed. No hand, no scabbard, no character.",
    "weapon:melee:axe": "One melee axe only. Close crop detail composition. Axe head is the primary focus. If the head is single-bit, the cutting edge must face right or slight bottom-right to match the overall tilt, never left. Show only a partial haft and never the full weapon length. The haft must physically reach the lower-left frame boundary and be visibly cropped by the image edge so it clearly continues out of frame, never ending inside the image. Haft geometry is strict: the shaft centerline must be one continuous straight line from the lower-left crop into and through the axe eye, with no kink, elbow, dogleg, S-curve, or sudden angle change near the head. Head alignment is strict: the head must be seated square on the haft at the axe eye and collar, not canted or twisted relative to the haft axis, and must not look like it is mounted at a different angle than the shaft. Haft continuity is strict: the haft must be a single solid round or oval wooden shaft passing through the axe eye, never split, forked, segmented, boxed, or rendered as a flat plank, and must not look broken or severed at the eye. Wraps are allowed but must be thin and follow the shaft, never a bulky barrel grip that hides the wood. The wood grain direction and any wraps must follow that same straight axis. Keep a consistent diagonal from lower-left to upper-right with a shallow 10-15 degree rise toward top-right. No hand, no character.",
    "weapon:ranged:bow": "One ranged bow only. Close crop detail composition around the grip and riser area, with only partial upper and lower limbs visible. Keep a consistent diagonal from lower-left to upper-right with a shallow 10-15 degree rise toward top-right. Do not show full bow length. Place the bowstring run noticeably closer to the bottom-left region of the frame, clearly separated from the grip window and riser, with a strong visible gap so the string never sits on or against the grip. No hand, no character.",
    "weapon:ranged:sling": "One ranged sling only. Full sling is allowed and should remain fully readable. The pouch must have two distinct visible cords, one from each side of the pouch, both clearly attached and readable, never a single-cord sling. Keep a consistent diagonal from lower-left to upper-right with a shallow 10-15 degree rise toward top-right. No hand, no character.",
    "weapon:arcane:wand": "One arcane wand only. Close crop detail composition. Focus tip and head are primary, show only a partial shaft and never full wand length. The wand shaft must run to the frame boundary so it reads as continuing out of frame, never cut midway. Keep a consistent diagonal from lower-left to upper-right with a shallow 10-15 degree rise toward top-right. Subtle runic inlays and restrained glow only. No hand, no character.",
