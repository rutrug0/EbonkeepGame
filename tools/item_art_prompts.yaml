  "general_prompt": "Rendering Model (Strict):\n\n2D game asset illustration\n\nmedium cel shading only\n\nmaximum three value groups per material (light, mid, shadow)\n\nsharp but slightly moderated shadow edges, no gradient blending\n\nno soft lighting\n\nno volumetric light\n\nno bloom outside silhouette\n\nno painterly brush texture\n\nno realistic rendering\n\nno 3D render look\n\nflat color fills\n\nminimal surface noise (subtle 5-10% texture only)\n\nLine & Shape Control:\n\nmedium-weight outer contour line\n\nthinner internal detail lines\n\nclean ink-style linework\n\nbold, readable silhouette\n\nsimplified surface detail\n\nno micro-detail rendering\n\nMaterial Definition:\n\nmetal rendered with flat highlight bands (no soft reflections)\n\nhighlights are graphic shapes, not gradients\n\nsteel tone slightly desaturated\n\nno high-gloss photoreal reflections\n\nColor System:\n\nmuted earthy palette\n\nsaturation restrained (moderate, not vibrant)\n\nselective accent highlight only\n\nglow restricted to thin contained lines\n\nglow does not spill beyond object silhouette\n\nRealism Control:\n\nsemi-realistic proportions (grounded but clearly illustrative)\n\nrealism level 4/10\n\nnot cartoon exaggerated\n\nnot photorealistic\n\nProhibited:\n\nno painterly rendering\n\nno soft gradient shading\n\nno dramatic cinematic lighting\n\nno heavy texture noise\n\nno environmental lighting\n\nno background elements\n\nAsset Presentation Rules (Locked)\n\nsingle isolated item\n\ncentered composition\n\ntransparent background (alpha channel)\n\nno environment\n\nno floor\n\nno cast shadow outside silhouette\n\nclean UI-ready presentation",
