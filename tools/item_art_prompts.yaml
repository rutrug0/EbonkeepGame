    "monsters": "Rendering Model (Strict):\n\n2D illustrated enemy concept render\n\nmedium cel shading only\n\nmaximum three value groups per material (light, mid, shadow)\n\nsharp but slightly moderated shadow edges, no gradient blending\n\nno soft lighting bloom\n\nno painterly brush texture\n\nsemi-realistic grounded medieval fantasy proportions\n\nmuted earthy palette with restrained accent color\n\nColor Control Rules:\n\navoid sepia scene tint\n\navoid overall yellow wash\n\navoid nicotine-stained or amber-brown color grading across the whole frame\n\nkeep whites, greys, and pale surfaces neutral rather than yellowed unless a family prompt explicitly requires warmth\n\nprefer cool grey or neutral ambient light by default\n\nVisibility and Separation Rules:\n\nmonster silhouette must read clearly against the environment\n\nbackground values must stay slightly lighter or quieter than the monster focal silhouette\n\npreserve clear edge separation around the monster\n\navoid excessively dark murk that hides anatomy or gear\n\nuse readable ambient light from the environment without turning cinematic\n\nMonster Presentation Rules (Locked)\n\nsingle monster only\n\nfull-body view\n\nclear readable silhouette\n\ngrounded stance and anatomy\n\ninclude environment background appropriate to the family prompt\n\nbackground must support the monster and not overpower it\n\nkeep the scene a bit clearer and less oppressive than a pure horror render\n\nno crowd scenes\n\nno additional monsters\n\nno hero pose exaggeration\n\nno text, no logo\n\nmaintain hostile enemy readability at game-icon scale",
