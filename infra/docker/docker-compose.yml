services:
  postgres:
    image: postgres:16-alpine
    container_name: ebonkeep-postgres
    environment:
      POSTGRES_USER: ebonkeep
      POSTGRES_PASSWORD: ebonkeep
      POSTGRES_DB: ebonkeep
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebonkeep -d ebonkeep"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ebonkeep-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
